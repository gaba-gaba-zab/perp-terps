<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Static copy of the contact form so Netlify's buildbot can detect it at
      deploy time. Astro's SSG output (with compression / view transitions) can
      hide the rendered form from the detector, so this plain-HTML mirror exists.

      The real, styled form lives in:
        src/components/sections/ContactSection.astro
      and its field config lives in:
        src/content/contact.md

      Keep the `name="contact"` and the field names below IN SYNC with that form.
      This file is intentionally not linked from the UI.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="space">
        <option value="Closet / cabinet">Closet / cabinet</option>
        <option value="Tent (2×2 to 4×4)">Tent (2×2 to 4×4)</option>
        <option value="Dedicated room">Dedicated room</option>
        <option value="Outdoor / greenhouse">Outdoor / greenhouse</option>
        <option value="Not sure yet">Not sure yet</option>
      </select>
      <select name="experience">
        <option value="First-timer">First-timer</option>
        <option value="1–3 harvests">1–3 harvests</option>
        <option value="5+ harvests">5+ harvests</option>
        <option value="Commercial / medical">Commercial / medical</option>
      </select>
      <input type="text" name="strains" />
      <textarea name="notes"></textarea>
    </form>
  </body>
</html>
