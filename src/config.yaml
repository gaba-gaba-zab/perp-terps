site:
  name: 'Perpetual Terpsters'
  site: 'https://perpterps.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

# Default SEO metadata
metadata:
  title:
    default: 'The Perpetual Terpsters Homegrow Gardening'
    template: '%s — The Perpetual Terpsters Homegrow Gardening'
  description: 'NJ-based homegrow gardening consultants. Free consultations and free seed starting for medical patients — hands-on help from setup to harvest.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Perpetual Terpsters'
    images:
      - url: '~/assets/images/og-default.png'
        width: 1200
        height: 630
    type: website

i18n:
  language: en
  textDirection: ltr

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
